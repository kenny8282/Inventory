# Redirect HTTP to HTTPS so phone cameras work
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS server (self-signed cert)
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/ssl/gridfinity/gridfinity.crt;
    ssl_certificate_key /etc/ssl/gridfinity/gridfinity.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /var/www/html;

    # Home page (the two-button landing)
    location = / {
        try_files /index.html =404;
    }

    # Label Forge under /forge/
    location = /forge { return 301 /forge/; }
    location /forge/ {
        alias /var/www/html/forge/;
        try_files $uri $uri/ /forge/index.html;
    }

    # Inventory app under /inventory/
    location = /inventory { return 301 /inventory/; }
    location /inventory/ {
        alias /var/www/html/inventory/;
        try_files $uri $uri/ /inventory/index.html;
    }

    # API proxy to Flask backend
    location /api/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Long timeouts for batch printing - the printer is slow (~5s per label)
        # and a 50-label batch can take several minutes.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 5s;
        client_max_body_size 50M;
    }
}
